<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YN 성구 암송 테스트</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .verse-info {
            background: #f0f4f8;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .reference {
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            resize: none;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .diff-label {
            font-weight: bold;
            display: block;
            margin-top: 0.5rem;
        }

        .original-text {
            display: block;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 성구 암송 테스트</h1>
        <div id="loading">성구를 불러오는 중...</div>
        
        <div id="test-area" style="display: none;">
            <div class="verse-info">
                <span id="reference-display" class="reference"></span>
            </div>
            
            <textarea id="user-input" placeholder="여기에 암송한 성구를 입력하세요..."></textarea>
            <button onclick="checkVerse()">확인하기</button>
            
            <div id="result"></div>
        </div>
    </div>

    <script>
        let currentVerse = null;

        // 성구 데이터 로드
        async function fetchVerses() {
            try {
                const response = await fetch('verses.json');
                const data = await response.json();
                if (data.length > 0) {
                    currentVerse = data[data.length - 1]; // 가장 최신 성구
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('test-area').style.display = 'block';
                    document.getElementById('reference-display').innerText = currentVerse.reference;
                }
            } catch (error) {
                console.error('Error fetching verses:', error);
                document.getElementById('loading').innerText = '성구를 불러오지 못했습니다.';
            }
        }

        // 비교를 위해 텍스트 정규화 (공백, 구두점 제거)
        function normalize(text) {
            return text.replace(/[.,\s]/g, '').trim();
        }

        function checkVerse() {
            const userInput = document.getElementById('user-input').value;
            const resultDiv = document.getElementById('result');
            
            const normalizedUser = normalize(userInput);
            const normalizedTarget = normalize(currentVerse.text);

            resultDiv.style.display = 'block';
            
            if (normalizedUser === normalizedTarget) {
                resultDiv.className = 'correct';
                resultDiv.innerHTML = '<strong>✅ 정답입니다!</strong><br>완벽하게 외우셨네요.';
            } else {
                resultDiv.className = 'wrong';
                resultDiv.innerHTML = `
                    <strong>❌ 다시 한번 확인해보세요.</strong>
                    <span class="diff-label">[원문]</span>
                    <span class="original-text">${currentVerse.text}</span>
                `;
            }
        }

        // 초기화
        fetchVerses();
    </script>
</body>
</html>
