<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YN 성구 퀴즈</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #1e293b;
        }

        .card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--primary);
        }

        .info-badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .quiz-container {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 24px;
            word-break: keep-all;
        }

        .blank {
            display: inline-block;
            border-bottom: 2px solid var(--primary);
            min-width: 60px;
            height: 1.2em;
            margin: 0 4px;
            vertical-align: middle;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 12px;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; grid-column: span 2; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        
        button:active { opacity: 0.7; }

        #message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .msg-success { background: #dcfce7; color: #166534; }
        .msg-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📖 성구 빈칸 맞추기</h1>
            <div id="ref-badge" class="info-badge">로딩 중...</div>
        </div>

        <div id="quiz-text" class="quiz-container">
            <!-- 퀴즈 텍스트가 여기에 들어갑니다 -->
        </div>

        <input type="text" id="answer-input" placeholder="빈칸에 들어갈 말을 순서대로 쓰세요" autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-primary" onclick="checkAnswer()">정답 확인</button>
            <button class="btn-secondary" onclick="showHint()">힌트 보기</button>
            <button class="btn-secondary" onclick="makeQuiz()">다른 빈칸</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        let fullText = "";
        let blanks = [];
        let currentVerse = null;

        async function init() {
            try {
                const res = await fetch('verses.json');
                const data = await res.json();
                // 가장 최근 성구를 가져오되, 나중에 데이터가 많아지면 랜덤 선택 가능
                currentVerse = data[Math.floor(Math.random() * data.length)];
                document.getElementById('ref-badge').innerText = currentVerse.reference;
                fullText = currentVerse.text;
                makeQuiz();
            } catch (e) {
                document.getElementById('ref-badge').innerText = "데이터 오류";
            }
        }

        function makeQuiz() {
            const words = fullText.split(' ');
            const numBlanks = Math.max(1, Math.floor(words.length * 0.4)); // 40% 정도 빈칸
            const blankIndices = [];
            
            while(blankIndices.length < numBlanks) {
                let idx = Math.floor(Math.random() * words.length);
                if(!blankIndices.includes(idx)) blankIndices.push(idx);
            }
            blankIndices.sort((a,b) => a-b);

            blanks = blankIndices.map(idx => words[idx].replace(/[.,]/g, ''));
            
            let displayHTML = words.map((word, idx) => {
                if(blankIndices.includes(idx)) return '<span class="blank">?</span>';
                return word;
            }).join(' ');

            document.getElementById('quiz-text').innerHTML = displayHTML;
            document.getElementById('answer-input').value = "";
            document.getElementById('message').style.display = "none";
        }

        function checkAnswer() {
            // 사용자 입력과 정답 모두에서 공백 및 모든 문장 부호를 제거하고 비교
            const normalize = (str) => str.replace(/[.,\s!?;:"']/g, '');
            
            const userAns = normalize(document.getElementById('answer-input').value);
            const targetAns = normalize(blanks.join(''));
            const msgDiv = document.getElementById('message');

            msgDiv.style.display = "block";
            if(userAns === targetAns && userAns !== "") {
                msgDiv.className = "msg-success";
                msgDiv.innerText = "🎉 정답입니다! 잘 외우셨네요.";
                document.getElementById('quiz-text').innerText = fullText;
            } else {
                msgDiv.className = "msg-error";
                msgDiv.innerText = "❌ 틀렸습니다. (쉼표, 마침표 없이 글자만 입력해보세요)";
            }
        }

        function showHint() {
            alert("원문: " + fullText);
        }

        init();
    </script>
</body>
</html>
