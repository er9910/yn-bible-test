<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>예은교회 암송성구 테스트</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --input-border: #e2e8f0;
            --badge-bg: #e0e7ff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text-main: #f1f5f9;
                --text-sub: #94a3b8;
                --input-border: #334155;
                --badge-bg: #312e81;
            }
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-main);
            transition: background-color 0.3s;
        }

        .card {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .info-group {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .info-badge {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .week-info {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .quiz-container {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 24px;
            word-break: keep-all;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blank {
            display: inline-block;
            border-bottom: 2px solid var(--primary);
            min-width: 50px;
            margin: 0 4px;
            color: var(--primary);
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 12px;
            box-sizing: border-box;
            background: var(--card);
            color: var(--text-main);
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; grid-column: span 2; }
        .btn-secondary { background: var(--input-border); color: var(--text-sub); }
        
        button:active { transform: scale(0.98); opacity: 0.8; }

        #message {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .msg-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        @media (prefers-color-scheme: dark) {
            .msg-success { background: #064e3b; color: #34d399; border-color: #065f46; }
            .msg-error { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>예은교회 암송성구 테스트</h1>
            <div class="info-group">
                <div id="ref-badge" class="info-badge">로딩 중...</div>
                <div id="week-display" class="week-info"></div>
            </div>
        </div>

        <div id="quiz-text" class="quiz-container"></div>

        <input type="text" id="answer-input" placeholder="빈칸에 들어갈 말을 쓰세요" autocomplete="off" autofocus>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="checkAnswer()">정답 확인</button>
            <button class="btn-secondary" onclick="showHint()">힌트 보기</button>
            <button class="btn-secondary" onclick="makeQuiz()">다른 빈칸</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        let fullText = "";
        let blanks = [];
        let currentVerse = null;

        async function init() {
            try {
                const res = await fetch('verses.json');
                const data = await res.json();
                currentVerse = data[Math.floor(Math.random() * data.length)];
                
                document.getElementById('ref-badge').innerText = currentVerse.reference;
                if(currentVerse.week) {
                    document.getElementById('week-display').innerText = currentVerse.week + " 주간 성구";
                }
                
                fullText = currentVerse.text;
                makeQuiz();
            } catch (e) {
                document.getElementById('ref-badge').innerText = "데이터 오류";
            }
        }

        function makeQuiz() {
            const words = fullText.split(' ');
            const numBlanks = Math.max(1, Math.floor(words.length * 0.4));
            const blankIndices = [];
            
            while(blankIndices.length < numBlanks) {
                let idx = Math.floor(Math.random() * words.length);
                if(!blankIndices.includes(idx)) blankIndices.push(idx);
            }
            blankIndices.sort((a,b) => a-b);

            blanks = blankIndices.map(idx => words[idx].replace(/[.,!?;:]/g, ''));
            
            let displayHTML = words.map((word, idx) => {
                if(blankIndices.includes(idx)) return '<span class="blank">?</span>';
                return word;
            }).join(' ');

            document.getElementById('quiz-text').innerHTML = displayHTML;
            document.getElementById('answer-input').value = "";
            document.getElementById('message').style.display = "none";
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const normalize = (str) => str.replace(/[.,\s!?;:"']/g, '');
            const userAns = normalize(document.getElementById('answer-input').value);
            const targetAns = normalize(blanks.join(''));
            const msgDiv = document.getElementById('message');

            msgDiv.style.display = "block";
            if(userAns === targetAns && userAns !== "") {
                msgDiv.className = "msg-success";
                msgDiv.innerText = "🎉 정답입니다! 잘 외우셨네요.";
                document.getElementById('quiz-text').innerText = fullText;
            } else {
                msgDiv.className = "msg-error";
                msgDiv.innerText = "❌ 다시 한번 생각해보세요!";
            }
        }

        function showHint() {
            alert("원문: " + fullText);
        }

        // 엔터키 지원
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkAnswer();
        });

        init();
    </script>
</body>
</html>
